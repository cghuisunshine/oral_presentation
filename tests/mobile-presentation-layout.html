<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mobile presentation layout test</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    iframe { position: fixed; inset: 0; width: 100vw; height: 100vh; border: 0; }
    #result { display: none; }
  </style>
</head>
<body>
  <iframe id="app" title="Presentation test application" src="../index.html"></iframe>
  <output id="result">pending</output>
  <script>
    const frame = document.getElementById('app');
    document.getElementById('result').textContent = 'listener-ready';
    frame.addEventListener('load', () => {
      document.getElementById('result').textContent = 'frame-loaded';
      try {
      const view = frame.contentWindow;
      const doc = frame.contentDocument;
      const present = doc.getElementById('present-view');
      doc.getElementById('prepare-view').hidden = true;
      doc.getElementById('finish-view').hidden = true;
      doc.getElementById('app-bar').hidden = true;
      present.hidden = false;
      present.style.paddingBottom = '40px';
      doc.getElementById('cue-display').textContent = Array.from(
        { length: 18 }, (_, index) => `Cue line ${index + 1} with supporting words`
      ).join('\n');
      requestAnimationFrame(() => requestAnimationFrame(() => {
        const controls = doc.querySelector('.present-controls');
        const buttons = [...controls.querySelectorAll('button')].map((button) => {
          const rect = button.getBoundingClientRect();
          return {
            left: rect.left, top: rect.top, right: rect.right, bottom: rect.bottom,
            width: rect.width, height: rect.height,
          };
        });
        const controlColumns = getComputedStyle(controls).gridTemplateColumns
          .split(' ').filter(Boolean).length;
        const root = doc.documentElement;
        const body = doc.body;
        document.getElementById('result').textContent = JSON.stringify({
          viewport: { width: view.innerWidth, height: view.innerHeight },
          documentScrolls: root.scrollHeight > root.clientHeight ||
            root.scrollWidth > root.clientWidth ||
            body.scrollHeight > view.innerHeight || body.scrollWidth > view.innerWidth,
          controlColumns,
          buttons,
        });
      }));
      } catch (error) {
        document.getElementById('result').textContent = `error:${error.name}:${error.message}`;
      }
    });
  </script>
</body>
</html>
